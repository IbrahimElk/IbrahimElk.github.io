<style>
  #meadow {
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    width: 100vw;
  }
  #meadow svg { display: block; width: 100%; }

  .prose:has(#meadow),
  article:has(#meadow) {
    padding-bottom: 0;
    margin-bottom: 0;
  }

  .prose > *:last-child,
  article > *:last-child {
    margin-bottom: 0 !important;
  }

  .sway {
    transform-origin: center bottom;
    animation: sway 9s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    40%       { transform: rotate(1.5deg); }
    70%       { transform: rotate(-1deg); }
  }

  .wiggle {
    transform-origin: center bottom;
    animation: wiggle 8s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    30%       { transform: rotate(3deg); }
    60%       { transform: rotate(-2deg); }
  }

  .pulse {
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.03); }
  }

  .flame {
    transform-origin: center bottom;
    animation: flicker 0.8s ease-in-out infinite alternate;
  }
  .f2 { animation-duration: 0.6s; animation-delay: 0.1s; }
  .f3 { animation-duration: 1.0s; animation-delay: 0.2s; }
  @keyframes flicker {
    0%   { transform: scaleX(1)   scaleY(1)   skewX(0deg); opacity: 0.85; }
    100% { transform: scaleX(0.9) scaleY(1.1) skewX(4deg); opacity: 1; }
  }

  .gfloat.rise {
    animation: rise 2s ease-out infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0);   opacity: 0.7; }
    100% { transform: translateY(-20px); opacity: 0; }
  }

  .swim {
    animation: swim 3s ease-in-out infinite alternate;
  }
  @keyframes swim {
    0%   { transform: translateX(-8px); }
    100% { transform: translateX(8px); }
  }

  #ladybug {
    position: fixed;
    left: 10px;
    cursor: pointer;
    z-index: 100;
    transition: transform 0.1s;
  }

  #bee-follow {
    position: fixed;
    pointer-events: none;
    z-index: 99;
    transition: left 0.4s ease-out, top 0.4s ease-out;
  }

  #critter-tip {
    position: fixed;
    background: rgba(255, 245, 214, 0.95);
    border: 1px solid #c8a86a;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.85rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 200;
  }
  #critter-tip.show { opacity: 1; }

  #meadow svg [id$="-c"] { cursor: pointer; }
</style>
