<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        video {
            display: none;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        #overlay {
            color: #333;
            font-family: sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            user-select: none;
        }
    </style>
</head>
<body onclick="startVideo()">

    <div id="overlay">Click to Enter</div>

    <video id="trollVideo" loop>
        <source src="assets/videos/troll.mp4" type="video/mp4">
    </video>

    <script>
        function startVideo() {
            const video = document.getElementById('trollVideo');
            const overlay = document.getElementById('overlay');

            video.style.display = 'block';
            overlay.style.display = 'none';

            video.play();
            
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
